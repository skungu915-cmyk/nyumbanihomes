  <path d="M230 410 Q290 440 370 395" stroke="#3468E5" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Left building (royal blue) -->
  <rect x="140" y="175" width="72" height="155" rx="4" fill="#3468E5"/>
  <rect x="140" y="138" width="72" height="44" rx="4" fill="#3468E5"/>
  <!-- Left building windows -->
  <rect x="153" y="155" width="20" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="183" y="155" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="153" y="185" width="20" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="183" y="185" width="17" height="16" rx="2" fill="white" opacity=".85"/>
