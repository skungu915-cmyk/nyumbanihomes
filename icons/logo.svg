  <rect x="248" y="125" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="270" y="125" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="248" y="158" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="270" y="158" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="248" y="191" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="270" y="191" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="248" y="224" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="270" y="224" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="248" y="257" width="14" height="22" rx="2" fill="white" opacity=".85"/>
  <rect x="270" y="257" width="14" height="22" rx="2" fill="white" opacity=".85"/>

  <!-- Right building (dark navy) -->
  <rect x="312" y="145" width="70" height="185" rx="4" fill="#1A2B6B"/>
  <!-- Right building windows -->
  <rect x="325" y="163" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="350" y="163" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="325" y="193" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="350" y="193" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="325" y="223" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="350" y="223" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="325" y="253" width="17" height="16" rx="2" fill="white" opacity=".85"/>
  <rect x="350" y="253" width="17" height="16" rx="2" fill="white" opacity=".85"/>

  <!-- Roof / chevron (house shape) - dark navy -->
  <path d="M128 355 L262 270 L396 355" stroke="#1A2B6B" stroke-width="26" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
  <!-- Roof left panel fill -->
  <path d="M128 355 L262 270 L262 310 L155 368 Z" fill="#1A2B6B"/>
  <!-- Roof right panel fill -->
  <path d="M396 355 L262 270 L262 310 L370 368 Z" fill="#1A2B6B"/>
  <!-- Window on house front -->
  <rect x="242" y="330" width="40" height="36" rx="3" fill="none" stroke="#1A2B6B" stroke-width="8"/>
  <line x1="262" y1="330" x2="262" y2="366" stroke="#1A2B6B" stroke-width="5"/>
  <line x1="242" y1="348" x2="282" y2="348" stroke="#1A2B6B" stroke-width="5"/>

  <!-- Text: Makao Hub -->
  <text x="50" y="450" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#1A2B6B" letter-spacing="-2">Makao</text>
  <text x="295" y="450" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#3468E5" letter-spacing="-2">Hub</text>

  <!-- Divider lines + RENT MANAGEMENT -->
  <line x1="50" y1="468" x2="140" y2="468" stroke="#1A2B6B" stroke-width="3"/>
  <text x="155" y="474" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#1A2B6B" letter-spacing="4">RENT MANAGEMENT</text>
